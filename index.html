<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیام‌رسان LOCAS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="telegram-container">
        <div class="chat-header">
            <div class="avatar">L</div>
            <div class="header-info">
                <h3>اتاق چت عمومی LOCAS</h3>
                <span class="status">آنلاین</span>
            </div>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message system">به پیام‌رسان LOCAS خوش آمدید! برای شروع چت نام خود را وارد کنید.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="username" placeholder="نام..." style="width: 25%;">
            <input type="text" id="messageInput" placeholder="پیام خود را بنویسید..." style="width: 60%;">
            <button onclick="sendMessage()" style="width: 15%;">ارسال</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
